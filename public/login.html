<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebo AI · Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #0f1115; color: #f4f4f1; min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .card { width: 100%; max-width: 380px; background: #1a1c22; border: 1px solid #2a2d36; border-radius: 16px; padding: 34px 30px; }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .brand__logo { width: 40px; height: 40px; border-radius: 10px; background: #23262f; display: grid; place-items: center; font-size: 20px; }
    .brand h1 { font-size: 18px; font-weight: 800; }
    .brand p { font-size: 12.5px; color: #8b8f9a; margin-top: 2px; }
    label { display: block; font-size: 12.5px; font-weight: 600; color: #b7bcc7; margin: 14px 0 6px; }
    input { width: 100%; padding: 11px 13px; font-size: 14px; border: 1px solid #2a2d36; border-radius: 10px; background: #14161b; color: #f4f4f1; }
    input:focus { outline: none; border-color: #4c8bf5; }
    button { width: 100%; margin-top: 22px; padding: 12px; font-size: 14.5px; font-weight: 700; color: #fff; background: #3574e0; border: none; border-radius: 10px; cursor: pointer; }
    button:hover { background: #2f68cc; }
    button:disabled { opacity: .6; cursor: default; }
    .err { margin-top: 14px; font-size: 13px; color: #f87171; min-height: 18px; text-align: center; }
  </style>
</head>
<body>
  <form class="card" id="loginForm">
    <div class="brand">
      <div class="brand__logo">N</div>
      <div>
        <h1>Iniciar sesión</h1>
        <p>Nebo AI · Conversaciones</p>
      </div>
    </div>
    <label for="email">Correo</label>
    <input type="email" id="email" autocomplete="username" required />
    <label for="password">Contraseña</label>
    <input type="password" id="password" autocomplete="current-password" required />
    <button type="submit" id="btn">Entrar</button>
    <div class="err" id="err"></div>
  </form>

  <script src="js/auth.js"></script>
  <script>
    (async () => {
      // Si ya hay sesión, al dashboard.
      try { const s = await Auth.session(); if (s) location.href = '/'; } catch (_) {}
    })();
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = ''; btn.disabled = true; btn.textContent = 'Entrando…';
      try {
        await Auth.signIn(document.getElementById('email').value.trim(), document.getElementById('password').value);
        location.href = '/';
      } catch (ex) {
        err.textContent = (ex && ex.message) === 'Invalid login credentials' ? 'Correo o contraseña incorrectos.' : (ex.message || 'No se pudo iniciar sesión.');
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
