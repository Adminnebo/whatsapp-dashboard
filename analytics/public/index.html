<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analítica · WhatsApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="viz-root">
  <header class="top">
    <div class="top__title">
      <div class="top__logo">📊</div>
      <div>
        <h1>Analítica · WhatsApp</h1>
        <p id="rangeLabel" class="top__sub">—</p>
      </div>
    </div>
    <div class="top__actions">
      <div class="segmented" id="rangeSeg" role="tablist" aria-label="Rango">
        <button class="seg" data-days="7">7 días</button>
        <button class="seg seg--active" data-days="30">30 días</button>
        <button class="seg" data-days="90">90 días</button>
        <button class="seg" data-days="all">Todo</button>
      </div>
      <button class="icon-btn" id="btnRefresh" title="Actualizar">↻</button>
      <button class="icon-btn" id="btnTheme" title="Tema claro/oscuro">◐</button>
    </div>
  </header>

  <nav class="tabs" id="tabs" role="tablist" aria-label="Vistas">
    <button class="tab tab--active" data-tab="resumen" role="tab">📈 Resumen</button>
    <button class="tab" data-tab="mensajes" role="tab">💬 Mensajes</button>
  </nav>

  <main class="wrap" id="main">
    <!-- Pestaña: Resumen (KPIs + gráficas) -->
    <div class="tabpanel" id="tabResumen">
      <section class="kpis" id="kpis"></section>

      <section class="card card--wide">
        <div class="card__head">
          <h2>Mensajes por día</h2>
          <div class="legend" id="legendDay"></div>
        </div>
        <div id="chartDay" class="chart"></div>
      </section>

      <div class="grid2">
        <section class="card">
          <div class="card__head">
            <h2>Horas pico</h2>
            <div class="legend" id="legendHour"></div>
          </div>
          <div id="chartHour" class="chart"></div>
          <p class="card__note" id="hourNote"></p>
        </section>

        <section class="card">
          <div class="card__head"><h2>Tipos enviados</h2></div>
          <div id="chartType" class="typebars"></div>
        </section>
      </div>
    </div>

    <!-- Pestaña: Mensajes (entrante + respuesta en la misma fila) -->
    <div class="tabpanel" id="tabMensajes" hidden>
      <section class="card card--wide" id="msgsCard">
        <div class="card__head">
          <h2>Mensajes — entrante y respuesta</h2>
          <input type="search" id="msgSearch" class="search-input" placeholder="Buscar teléfono, nombre o texto…" autocomplete="off" />
        </div>
        <div class="tablewrap">
          <table class="msgs msgs--pairs" id="msgsTable">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Teléfono</th>
                <th>Entrante (cliente)</th>
                <th>Respuesta (bot)</th>
                <th class="num">Ejecución</th>
                <th>Modelo</th>
                <th class="num">Coste IA</th>
                <th class="num">Coste</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="msgsBody"></tbody>
          </table>
        </div>
        <div class="pager" id="msgsPager"></div>
        <p class="card__note" id="msgsNote"></p>
      </section>
    </div>
  </main>

  <div id="tip" class="tip" hidden></div>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
